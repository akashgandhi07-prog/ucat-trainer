# Bullet 1 + 5: trainer migration scan, lint, and production build.
# Bullets 2 + 8: planner verifies after clean `uk/` npm ci (matches CI; alias unify:bullet2-verify-ci).
# Bullet 9: same gate runs weekly via unify-scheduled-verify.yml.

name: Trainer and planner unify guard

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - "eslint.config.*"
      - "uk/**"
      - ".github/workflows/trainer-unify-guard.yml"
      - ".github/workflows/unify-scheduled-verify.yml"
  push:
    branches:
      - main
      - skills-plan-unify

jobs:
  unify-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            uk/package-lock.json

      - name: Install root (Vite trainer)
        run: npm ci

      - name: Full unify gate (bullet 1 + planner install + lint + Next build)
        run: npm run unify:bullet2-verify-ci
